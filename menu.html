<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #111113;
    --surface: #18181b;
    --surface2: #1e1e22;
    --border: rgba(255,255,255,0.07);
    --border-selected: rgba(255,255,255,0.25);
    --accent: #ffffff;
    --accent-left: #a0a0b0;
    --text: #f0f0f0;
    --text-dim: #6b6b7a;
    --text-mid: #9999aa;
    --selected-bg: #1e1e22;
    --selected-border: #ffffff;
    --arrow: #555560;
    --arrow-selected: #cccccc;
  }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding-left: 50px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  #app.visible { opacity: 1; }

  #menu-stack {
    display: flex;
    align-items: flex-start;
    gap: 0;
  }

  /* ── Panel ── */
  .menu-panel {
    width: 260px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  .menu-panel.animate-in {
    animation: panel-in 0.12s ease forwards;
  }

  @keyframes panel-in {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ── Logo / Header ── */
  .menu-logo {
    padding: 20px 18px 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .menu-logo-img {
    width: 100%;
    max-height: 80px;
    object-fit: contain;
    object-position: left center;
    margin-bottom: 6px;
    display: none; /* ukryte dopóki nie ma obrazka */
  }

  .menu-logo-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .menu-logo-sub {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* ── Divider ── */
  .menu-divider {
    height: 1px;
    background: var(--border);
    margin: 0;
  }

  /* ── Items ── */
  .menu-items {
    padding: 4px 0;
  }

  .menu-item {
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 16px 0 18px;
    height: 44px;
    cursor: default;
    gap: 10px;
    border-left: 2px solid transparent;
    transition: none;
  }

  .menu-item.selected {
    background: var(--selected-bg);
    border-left-color: var(--selected-border);
  }

  .item-label {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.01em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .menu-item.selected .item-label {
    color: var(--text);
  }

  .item-arrow {
    font-size: 11px;
    color: var(--arrow);
    flex-shrink: 0;
    line-height: 1;
  }

  .menu-item.selected .item-arrow {
    color: var(--arrow-selected);
  }

  /* ── Separator ── */
  .menu-sep {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* ── Footer ── */
  .menu-footer {
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .footer-brand {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  .footer-brand-icon {
    width: 14px; height: 14px;
    opacity: 0.4;
  }

  .footer-brand-icon svg {
    width: 100%; height: 100%;
    fill: var(--text-mid);
  }

  .footer-pages {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 3px;
  }

  .footer-date {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* ── Submenu panel (no logo, just items) ── */
  .menu-panel.sub-panel .menu-logo {
    padding: 14px 18px 10px;
  }

  .menu-panel.sub-panel .menu-logo-title {
    font-size: 11px;
    color: var(--text-mid);
  }

  /* ── Notification ── */
  #notification {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-mid);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 7px 18px;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
    pointer-events: none;
    white-space: nowrap;
  }

  #notification.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div id="app">
  <div id="menu-stack"></div>
</div>
<div id="notification"></div>

<script>
const MENU_DATA = {
  id: 'root', title: 'ALPRAZOLAM', subtitle: 'VERSION 1.0',
  items: [
    { label: 'Player', submenu: {
        id: 'player', title: 'PLAYER', subtitle: 'Opcje gracza',
        items: [
          { label: 'Statystyki' }, { label: 'Leczenie' }, { label: 'Ekwipunek' },
          { label: 'Wygląd', submenu: {
              id: 'appearance', title: 'WYGLĄD', subtitle: 'Edycja postaci',
              items: [{ label: 'Fryzura' }, { label: 'Ubranie' }, { label: 'Akcesoria' }]
          }},
          { label: 'Umiejętności' },
        ]
    }},
    { label: 'Server', submenu: {
        id: 'server', title: 'SERVER', subtitle: 'Opcje serwera',
        items: [{ label: 'Gracze online' }, { label: 'Ogłoszenia' }, { label: 'Zasady' }]
    }},
    { label: 'Vehicle', submenu: {
        id: 'vehicle', title: 'VEHICLE', subtitle: 'Zarządzanie pojazdem',
        items: [{ label: 'Naprawa' }, { label: 'Paliwo' }, { label: 'Tuning' }, { label: 'Spawnuj pojazd' }]
    }},
    { label: 'Miscellaneous', submenu: {
        id: 'misc', title: 'MISCELLANEOUS', subtitle: 'Różne',
        items: [{ label: 'Teleport' }, { label: 'Czas i pogoda' }, { label: 'Animacje' }]
    }},
    { label: 'Settings' },
  ]
};

let stack = [];
let isVisible = false;
const app = document.getElementById('app');
const stackEl = document.getElementById('menu-stack');
const notifEl = document.getElementById('notification');

function notify(msg) {
  notifEl.textContent = msg;
  notifEl.classList.add('show');
  setTimeout(() => notifEl.classList.remove('show'), 1600);
}

function selectableItems(menuDef) {
  return menuDef.items.filter(i => i.type !== 'sep');
}

function totalPages() {
  // zlicz wszystkie "strony" w drzewie menu (uproszczone)
  return 5;
}

function renderPanel(menuDef, selectedIndex, animate = true, isRoot = false) {
  const panel = document.createElement('div');
  panel.className = 'menu-panel' + (animate ? ' animate-in' : '') + (!isRoot ? ' sub-panel' : '');

  // Logo / header
  const logo = document.createElement('div');
  logo.className = 'menu-logo';
  logo.innerHTML = `
    <div class="menu-logo-title">${menuDef.title}</div>
    <div class="menu-logo-sub">${menuDef.subtitle || ''}</div>
  `;
  panel.appendChild(logo);

  const divider = document.createElement('div');
  divider.className = 'menu-divider';
  panel.appendChild(divider);

  // Items
  const itemsEl = document.createElement('div');
  itemsEl.className = 'menu-items';
  let si = -1;
  menuDef.items.forEach(item => {
    if (item.type === 'sep') {
      const sep = document.createElement('div');
      sep.className = 'menu-sep';
      itemsEl.appendChild(sep);
      return;
    }
    si++;
    const el = document.createElement('div');
    el.className = 'menu-item' + (si === selectedIndex ? ' selected' : '');
    const hasArrow = item.submenu;
    el.innerHTML = `
      <div class="item-label">${item.label}</div>
      ${hasArrow ? `<div class="item-arrow">›</div>` : ''}
    `;
    itemsEl.appendChild(el);
  });
  panel.appendChild(itemsEl);

  // Footer (tylko root panel)
  if (isRoot) {
    const footer = document.createElement('div');
    footer.className = 'menu-footer';
    const now = new Date();
    const dateStr = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getFullYear()).slice(2)}`;
    footer.innerHTML = `
      <div class="footer-brand">
        <div class="footer-brand-icon">
          <svg viewBox="0 0 16 16"><path d="M8 1L1 5v6l7 4 7-4V5L8 1z"/></svg>
        </div>
        <span>menu</span>
      </div>
      <div class="footer-pages" id="footer-pages">1/1</div>
      <div class="footer-date">${dateStr}</div>
    `;
    panel.appendChild(footer);
  }

  return panel;
}

function redrawCurrent() {
  const frame = stack[stack.length - 1];
  if (!frame) return;
  const items = frame.panelEl.querySelectorAll('.menu-item');
  items.forEach((el, i) => {
    el.classList.toggle('selected', i === frame.selectedIndex);
  });
  // Aktualizuj licznik stron
  const fp = document.getElementById('footer-pages');
  if (fp) {
    const sel = frame.selectedIndex + 1;
    const total = selectableItems(frame.menuDef).length;
    fp.textContent = `${sel}/${total}`;
  }
}

function actionShow() {
  isVisible = true;
  app.classList.add('visible');
  if (stack.length === 0) {
    const panelEl = renderPanel(MENU_DATA, 0, true, true);
    stackEl.appendChild(panelEl);
    stack.push({ menuDef: MENU_DATA, selectedIndex: 0, panelEl });
    redrawCurrent();
  }
}

function actionHide() {
  isVisible = false;
  app.classList.remove('visible');
  setTimeout(() => { stack.forEach(f => f.panelEl.remove()); stack = []; }, 200);
}

function actionNav(direction) {
  if (!isVisible || stack.length === 0) return;
  const frame = stack[stack.length - 1];
  const items = selectableItems(frame.menuDef);
  frame.selectedIndex = direction === 'up'
    ? (frame.selectedIndex - 1 + items.length) % items.length
    : (frame.selectedIndex + 1) % items.length;
  redrawCurrent();
}

function actionEnter() {
  if (!isVisible || stack.length === 0) return;
  const frame = stack[stack.length - 1];
  const item = selectableItems(frame.menuDef)[frame.selectedIndex];
  if (!item) return;
  if (item.submenu) {
    const panelEl = renderPanel(item.submenu, 0, true, false);
    stackEl.appendChild(panelEl);
    stack.push({ menuDef: item.submenu, selectedIndex: 0, panelEl });
    redrawCurrent();
  } else {
    notify(item.label);
  }
}

function actionBack() {
  if (!isVisible || stack.length === 0) return;
  if (stack.length === 1) { actionHide(); return; }
  const frame = stack.pop();
  frame.panelEl.remove();
  redrawCurrent();
}

window.addEventListener('message', e => {
  const d = e.data;
  if (!d || !d.type) return;
  switch (d.type) {
    case 'show':     actionShow(); break;
    case 'hide':     actionHide(); break;
    case 'navigate': actionNav(d.direction); break;
    case 'enter':    actionEnter(); break;
    case 'back':     actionBack(); break;
  }
});

if (!window.invokeNative) actionShow();
</script>
</body>
</html>

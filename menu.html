<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --surface: rgba(10, 14, 20, 0.92);
    --border: rgba(0, 220, 180, 0.18);
    --border-active: rgba(0, 220, 180, 0.65);
    --accent: #00dcb4;
    --accent-dim: rgba(0, 220, 180, 0.08);
    --accent-glow: rgba(0, 220, 180, 0.3);
    --text: #d4e8e2;
    --text-dim: rgba(212, 232, 226, 0.45);
    --selected-bg: rgba(0, 220, 180, 0.1);
    --header-bg: rgba(0, 220, 180, 0.07);
  }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
  }

  #app {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex; align-items: center;
    justify-content: flex-start;
    padding-left: 60px;
    pointer-events: none;
    opacity: 0; transition: opacity 0.2s ease;
  }

  #app.visible { opacity: 1; }
  #menu-stack { display: flex; align-items: flex-start; }

  .menu-panel {
    width: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    backdrop-filter: blur(16px);
    position: relative; overflow: hidden;
  }

  .menu-panel.animate-in {
    animation: panel-in 0.15s ease forwards;
  }

  .menu-panel::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .menu-panel::after {
    content: ''; position: absolute; top: 0; left: 0;
    width: 2px; height: 100%;
    background: linear-gradient(180deg, var(--accent), transparent 60%);
    opacity: 0.5;
  }

  .menu-panel:not(:first-child) { margin-left: -1px; border-left-color: var(--border-active); }

  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none; z-index: 10;
  }

  .menu-header {
    background: var(--header-bg); border-bottom: 1px solid var(--border);
    padding: 10px 14px 8px; display: flex; align-items: center; gap: 10px;
  }

  .menu-header .icon {
    width: 22px; height: 22px; border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative;
  }

  .menu-header .icon::before { content: ''; position: absolute; inset: 2px; background: var(--accent); opacity: 0.15; }
  .menu-header .icon svg { width: 12px; height: 12px; fill: var(--accent); position: relative; }

  .menu-title {
    font-size: 13px; font-weight: 700; color: var(--accent);
    letter-spacing: 0.12em; text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace; line-height: 1;
  }

  .menu-title::after { content: '_'; animation: blink 1.2s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .menu-subtitle { font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; margin-top: 2px; }

  .menu-breadcrumb {
    font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--text-dim);
    letter-spacing: 0.08em; padding: 4px 14px;
    border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .menu-breadcrumb span { color: var(--accent); opacity: 0.7; }
  .menu-items { padding: 4px 0; }

  .menu-item {
    position: relative; display: flex; align-items: center;
    padding: 0 12px; height: 36px; gap: 10px;
  }

  .menu-item::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 2px; background: var(--accent); opacity: 0;
  }

  .menu-item.selected { background: var(--selected-bg); }
  .menu-item.selected::before { opacity: 1; }

  .item-selector { width: 6px; height: 6px; border: 1px solid var(--text-dim); flex-shrink: 0; }

  .menu-item.selected .item-selector {
    border-color: var(--accent); background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
  }

  .item-label {
    flex: 1; font-size: 13px; font-weight: 600; color: var(--text-dim);
    letter-spacing: 0.04em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .menu-item.selected .item-label { color: var(--text); }
  .item-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  .item-badge {
    font-family: 'Share Tech Mono', monospace; font-size: 9px; padding: 1px 5px;
    border: 1px solid var(--border-active); color: var(--accent);
    background: var(--accent-dim); letter-spacing: 0.06em; text-transform: uppercase;
  }

  .item-arrow { color: var(--text-dim); font-size: 10px; }
  .menu-item.selected .item-arrow { color: var(--accent); }

  .menu-sep { height: 1px; background: var(--border); margin: 4px 12px; position: relative; }

  .menu-sep::before {
    content: attr(data-label); position: absolute; top: -8px; left: 0;
    font-size: 9px; color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--surface); padding-right: 6px;
  }

  .menu-footer {
    border-top: 1px solid var(--border); padding: 6px 12px;
    display: flex; justify-content: space-between; background: rgba(0,0,0,0.25);
  }

  .key-hint {
    display: flex; align-items: center; gap: 5px;
    font-size: 9px; color: var(--text-dim);
    letter-spacing: 0.06em; font-family: 'Share Tech Mono', monospace;
  }

  .key-hint kbd {
    font-family: 'Share Tech Mono', monospace; font-size: 8px; padding: 1px 5px;
    border: 1px solid rgba(212,232,226,0.2); background: rgba(255,255,255,0.04); color: var(--text-dim);
  }

  @keyframes panel-in { 0%{opacity:0;transform:translateX(-8px)} 100%{opacity:1;transform:translateX(0)} }

  #notification {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border-active);
    color: var(--accent); font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em; padding: 8px 20px;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; white-space: nowrap; text-transform: uppercase;
  }

  #notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <div id="menu-stack"></div>
</div>
<div id="notification"></div>

<script>
const MENU_DATA = {
  id: 'root', title: 'GŁÓWNE MENU', subtitle: 'Panel sterowania',
  items: [
    { label: 'Gracz', badge: 'SUB', submenu: {
        id: 'player', title: 'GRACZ', subtitle: 'Opcje gracza',
        items: [
          { label: 'Statystyki' }, { label: 'Leczenie' }, { label: 'Ekwipunek' },
          { label: 'Wygląd', badge: 'SUB', submenu: {
              id: 'appearance', title: 'WYGLĄD', subtitle: 'Edycja postaci',
              items: [{ label: 'Fryzura' }, { label: 'Ubranie' }, { label: 'Akcesoria' }]
          }},
          { label: 'Umiejętności' },
        ]
    }},
    { label: 'Pojazd', badge: 'SUB', submenu: {
        id: 'vehicle', title: 'POJAZD', subtitle: 'Zarządzanie pojazdem',
        items: [{ label: 'Naprawa' }, { label: 'Paliwo' }, { label: 'Tuning' }, { label: 'Spawnuj pojazd' }]
    }},
    { type: 'sep', label: 'Ogólne' },
    { label: 'Teleport' }, { label: 'Czas i pogoda' }, { label: 'Ustawienia' },
    { type: 'sep', label: 'Sesja' },
    { label: 'Zamknij menu' },
  ]
};

let stack = [];
let isVisible = false;
const app = document.getElementById('app');
const stackEl = document.getElementById('menu-stack');
const notifEl = document.getElementById('notification');

function notify(msg) {
  notifEl.textContent = msg;
  notifEl.classList.add('show');
  setTimeout(() => notifEl.classList.remove('show'), 1800);
}

function selectableItems(menuDef) {
  return menuDef.items.filter(i => i.type !== 'sep');
}

function renderPanel(menuDef, selectedIndex, animate = true) {
  const panel = document.createElement('div');
  panel.className = 'menu-panel' + (animate ? ' animate-in' : '');
  panel.innerHTML = '<div class="scanlines"></div>';

  const header = document.createElement('div');
  header.className = 'menu-header';
  header.innerHTML = `
    <div class="icon">
      <svg viewBox="0 0 12 12"><rect x="1" y="1" width="4" height="4"/><rect x="7" y="1" width="4" height="4"/><rect x="1" y="7" width="4" height="4"/><rect x="7" y="7" width="4" height="4"/></svg>
    </div>
    <div>
      <div class="menu-title">${menuDef.title}</div>
      ${menuDef.subtitle ? `<div class="menu-subtitle">${menuDef.subtitle}</div>` : ''}
    </div>`;
  panel.appendChild(header);

  const bc = document.createElement('div');
  bc.className = 'menu-breadcrumb';
  const trail = stack.map(s => s.menuDef.title).concat([menuDef.title]);
  bc.innerHTML = trail.map((t, i) => i < trail.length - 1 ? `<span>${t}</span> › ` : t).join('');
  panel.appendChild(bc);

  const itemsEl = document.createElement('div');
  itemsEl.className = 'menu-items';
  let si = -1;
  menuDef.items.forEach(item => {
    if (item.type === 'sep') {
      const sep = document.createElement('div');
      sep.className = 'menu-sep';
      if (item.label) sep.setAttribute('data-label', item.label);
      itemsEl.appendChild(sep);
      return;
    }
    si++;
    const el = document.createElement('div');
    el.className = 'menu-item' + (si === selectedIndex ? ' selected' : '');
    el.innerHTML = `
      <div class="item-selector"></div>
      <div class="item-label">${item.label}</div>
      <div class="item-right">
        ${item.badge ? `<span class="item-badge">${item.badge}</span>` : ''}
        ${item.submenu ? `<span class="item-arrow">▶</span>` : ''}
      </div>`;
    itemsEl.appendChild(el);
  });
  panel.appendChild(itemsEl);

  const footer = document.createElement('div');
  footer.className = 'menu-footer';
  const isRoot = stack.length === 0;
  footer.innerHTML = `
    <div class="key-hint"><kbd>↑↓</kbd> nawigacja</div>
    <div class="key-hint"><kbd>ENTER</kbd> wybierz</div>
    <div class="key-hint"><kbd>${isRoot ? 'F5' : 'BKSP'}</kbd> ${isRoot ? 'zamknij' : 'wstecz'}</div>`;
  panel.appendChild(footer);
  return panel;
}

function redrawCurrent() {
  const frame = stack[stack.length - 1];
  if (!frame) return;
  const newPanel = renderPanel(frame.menuDef, frame.selectedIndex, false);
  stackEl.replaceChild(newPanel, frame.panelEl);
  frame.panelEl = newPanel;
}

function actionShow() {
  isVisible = true;
  app.classList.add('visible');
  if (stack.length === 0) {
    const panelEl = renderPanel(MENU_DATA, 0);
    stackEl.appendChild(panelEl);
    stack.push({ menuDef: MENU_DATA, selectedIndex: 0, panelEl });
  }
}

function actionHide() {
  isVisible = false;
  app.classList.remove('visible');
  setTimeout(() => { stack.forEach(f => f.panelEl.remove()); stack = []; }, 200);
}

function actionNav(direction) {
  if (!isVisible || stack.length === 0) return;
  const frame = stack[stack.length - 1];
  const items = selectableItems(frame.menuDef);
  frame.selectedIndex = direction === 'up'
    ? (frame.selectedIndex - 1 + items.length) % items.length
    : (frame.selectedIndex + 1) % items.length;
  redrawCurrent();
}

function actionEnter() {
  if (!isVisible || stack.length === 0) return;
  const frame = stack[stack.length - 1];
  const item = selectableItems(frame.menuDef)[frame.selectedIndex];
  if (!item) return;
  if (item.submenu) {
    const panelEl = renderPanel(item.submenu, 0);
    stackEl.appendChild(panelEl);
    stack.push({ menuDef: item.submenu, selectedIndex: 0, panelEl });
  } else if (item.label === 'Zamknij menu') {
    actionHide();
  } else {
    notify(`▶ ${item.label}`);
  }
}

function actionBack() {
  if (!isVisible || stack.length === 0) return;
  if (stack.length === 1) { actionHide(); return; }
  const frame = stack.pop();
  frame.panelEl.remove();
}

// Wiadomości z Lua
window.addEventListener('message', e => {
  const d = e.data;
  if (!d || !d.type) return;
  switch (d.type) {
    case 'show':     actionShow(); break;
    case 'hide':     actionHide(); break;
    case 'navigate': actionNav(d.direction); break;
    case 'enter':    actionEnter(); break;
    case 'back':     actionBack(); break;
  }
});

// DEV: auto-show w przeglądarce
if (!window.invokeNative) actionShow();
</script>
</body>
</html>
